# Paude proxy configuration
# Allowlist for Google Cloud / Vertex AI access only

# Basic settings
http_port 3128
cache_log /tmp/squid-cache.log
cache deny all

# Fast shutdown - no need to wait for clients since proxy stops after main container
shutdown_lifetime 0 seconds

# OpenShift compatibility - use writable location for PID file
pid_filename /tmp/squid.pid

# DNS settings
# Use system resolv.conf (populated by podman with working DNS)

# Allowlisted domains for Vertex AI and Google Auth
acl allowed_domains dstdomain accounts.google.com
acl allowed_domains dstdomain oauth2.googleapis.com
acl allowed_domains dstdomain www.googleapis.com
# Regional endpoints use REGION-aiplatform (hyphens, not subdomains)
acl allowed_domains_regex dstdom_regex aiplatform\.googleapis\.com$
acl allowed_domains dstdomain cloudresourcemanager.googleapis.com
acl allowed_domains dstdomain iamcredentials.googleapis.com
acl allowed_domains dstdomain sts.googleapis.com
acl allowed_domains dstdomain storage.googleapis.com

# SSL/CONNECT ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Log blocked (denied) requests to a file (not /dev/stdout because squid's
# cache_effective_user cannot write to /dev/stdout after privilege drop).
# Note: logs requests to non-allowed domains. Port-based denials on allowed
# domains (e.g. non-443 CONNECT to googleapis.com) are not captured.
logformat blocked %tl %>a %Ss/%03>Hs %rm %ru BLOCKED
access_log /tmp/squid-blocked.log blocked !allowed_domains !allowed_domains_regex

# Custom minimal error page (no Squid branding)
error_directory /usr/share/squid/errors/en
deny_info ERR_CUSTOM_ACCESS_DENIED all

# Access rules
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_domains
http_access allow allowed_domains_regex
http_access deny all

# Security headers
via off
forwarded_for delete

# Hide proxy identity
httpd_suppress_version_string on
visible_hostname paude-proxy
